services:
  postgres:
    image: postgres:16-alpine
    container_name: spinywheely-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: spinywheely
      POSTGRES_PASSWORD: spinywheely
      POSTGRES_DB: spinywheely
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spinywheely -d spinywheely"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spinywheely-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
