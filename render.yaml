services:
  - type: web
    name: spiny-wheely-api
    runtime: node
    region: oregon  # change to: frankfurt | singapore | ohio as needed
    plan: free      # upgrade to 'starter' ($7/mo) to avoid spin-down

    # Render runs these from the repo root
    buildCommand: npm ci --workspace=@spiny-wheely/backend --include-workspace-root && npm run build:api

    # Auto-run DB migrations before each deploy (uses compiled JS after build)
    preDeployCommand: node -e "require('./backend/dist/database/run-migrations.js')"

    startCommand: node backend/dist/main.js

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_POOL_MAX
        value: 5  # free Postgres has limited connections

      # Render auto-sets DATABASE_URL when you link the Postgres database below
      - key: DATABASE_URL
        fromDatabase:
          name: spiny-wheely-db
          property: connectionString

      # Upstash Redis — fill these in Render dashboard after creating Upstash instance
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false

      # Render auto-generates a strong random secret on first deploy
      - key: JWT_SECRET
        generateValue: true

      # Set this to your Vercel URL after the frontend is deployed (Step 4)
      - key: FRONTEND_URL
        sync: false

databases:
  - name: spiny-wheely-db
    databaseName: spinywheely
    user: spinywheely
    plan: free  # upgrade to 'starter' ($7/mo) for persistence beyond 90 days
