# Multi-instance API POC — run with:
#   docker compose -f docker-compose.yml -f docker-compose.scale.yml up -d --build --scale api=3
# API load-balanced at http://localhost:8080

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: spinywheely
      DATABASE_PASSWORD: spinywheely
      DATABASE_NAME: spinywheely
      DATABASE_POOL_MAX: 10
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    profiles: ["migrate"]
    entrypoint: ["node", "backend/dist/database/run-migrations.js"]
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: spinywheely
      DATABASE_PASSWORD: spinywheely
      DATABASE_NAME: spinywheely
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./deploy/docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
